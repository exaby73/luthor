version: ^0.8.0

workspace:
  - packages/*
  - packages/*/example

catalog:
  version: 0.18.0

  dependencies:
    luthor: 0.18.0
    luthor_generator: 0.18.0

    analyzer: ^10.0.0
    build: ^4.0.0
    build_test: ^3.5.0
    build_runner: ^2.15.0
    collection: ^1.19.0
    dart_mappable: ^4.8.0
    dart_mappable_builder: ">=4.7.0 <4.9.0"
    freezed: ^3.2.0
    freezed_annotation: ^3.1.0
    json_annotation: ^4.12.0
    json_serializable: ^6.14.0
    lint: ^2.8.0
    lints: ^6.0.0
    meta: ^1.18.0
    source_gen: ^4.2.0
    test: ^1.31.0

scripts:
  analyze:
    command: dart analyze
    runInPackages:
      - packages/*

  fix:
    command: dart fix --apply
    runInPackages:
      - packages/*

  format:
    command: dart format --set-exit-if-changed .
    runInPackages:
      - packages/*

  test:
    command: dart test
    runInPackages:
      - packages/luthor
      - packages/luthor_generator

  build:
    command: dart run build_runner build
    runInPackages:
      - packages/luthor_generator/example

  publish:luthor:
    command: dart pub publish -f
    runInPackages:
      - packages/luthor

  publish:luthor_generator:
    command: dart pub publish -f
    runInPackages:
      - packages/luthor_generator

  publish:all:
    command: dart pub publish -f
    runInPackages:
      - packages/*
